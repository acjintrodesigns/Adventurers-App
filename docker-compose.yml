version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Adventurers@2024!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

  backend:
    build: ./backend
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=AdventurersDb;User Id=sa;Password=Adventurers@2024!;TrustServerCertificate=True
      - Jwt__Key=AdventurersSecretKey2024SuperLongKeyForSecurity!
      - Jwt__Issuer=AdventurersApp
      - Jwt__Audience=AdventurersAppUsers
    depends_on:
      - db

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_AI_SERVICE_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  sqldata:
